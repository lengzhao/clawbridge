# 本地跑通示例用：noop 不访问外网。对接飞书/Slack 可复制仓库根目录 config.example.yaml 并改 enabled。
# 未配置 media 时使用系统临时目录下的 clawbridge/。

clients:
  - id: noop-1
    driver: noop
    enabled: true
  - id: webchat-1
    driver: webchat
    enabled: true
    options:
      display_name: You
      listen: "127.0.0.1:8765"
      path: /