# clawbridge 配置示例；复制为 config.yaml 后按需修改。
# 结构对应 config.Config（见 config/config.go）。

# media 可选：不写整块，或 root 留空 / 仅空白 → 使用系统临时目录下的 clawbridge/（见 media.NewLocalBackend）。
# 需要固定落盘路径时再配置，例如：
# media:
#   root: /var/tmp/clawbridge

clients:
  # 飞书：长连接（WebSocket），见 drivers/feishu
  - id: feishu-bot-1
    driver: feishu
    enabled: false
    options:
      app_id: cli_xxxxxxxx
      app_secret: "your_app_secret"
      verification_token: "your_verification_token"
      encrypt_key: ""
      is_lark: false
      allow_from:
        - "*"
      group_trigger:
        mention_only: true
        prefixes:
          - /ask
          - /bot
    # webchat 等在 options 下使用 listen / path（见 webchat 示例）

  # Slack：Socket Mode（见 drivers/slack）
  - id: slack-bot-1
    driver: slack
    enabled: false
    options:
      bot_token: "xoxb-..."
      app_token: "xapp-..."
      allow_from:
        - "*"
      group_trigger:
        mention_only: true
        prefixes:
          - /ask

  # Telegram：Bot 长轮询（见 drivers/telegram，源自 PicoClaw）
  - id: telegram-bot-1
    driver: telegram
    enabled: false
    options:
      bot_token: "123456:ABC..."
      # proxy: "http://127.0.0.1:7890"
      # base_url: "" # 可选，自建 Bot API 时填写
      use_markdown_v2: false
      allow_from:
        - "*"
      group_trigger:
        mention_only: true
        prefixes:
          - /ask

  # 微信：iLink Bot 长轮询（见 drivers/weixin，源自 PicoClaw）
  # 扫码绑定：client.RunOnboarding + client.ReportOnboarding；示例 go run ./examples/weixin-onboard -listen 127.0.0.1:8769；-print-secrets 打印明文；-write-config 写入明文 YAML
  - id: weixin-bot-1
    driver: weixin
    enabled: false
    options:
      token: "ilink_bot_token"
      # bot_token: "" # 与 token 二选一
      # base_url: "https://ilinkai.weixin.qq.com/"
      # proxy: ""
      # state_dir: "" # 默认 ~/.cache/clawbridge/weixin/<client_id>
      # cdn_base_url: ""
      allow_from:
        - "*"

  # 本地浏览器聊天 UI（类 ChatGPT），经 HTTP + SSE 与总线交互；仅建议绑定 127.0.0.1
  # 附件上传/下载依赖与 Bridge 一同配置的 media（本地目录等）；单请求体上限约 32MiB
  - id: webchat-1
    driver: webchat
    enabled: false
    options:
      display_name: You
      listen: "127.0.0.1:8765"
      path: /

  # 占位/测试用 driver
  - id: noop-1
    driver: noop
    enabled: false
