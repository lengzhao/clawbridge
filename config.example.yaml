# clawbridge 配置示例；复制为 config.yaml 后按需修改。
# 结构对应 config.Config（见 config/config.go）。

media:
  # 本地媒体根目录；空则由实现使用默认临时目录
  root: /var/tmp/clawbridge

clients:
  # 飞书：长连接（WebSocket），见 drivers/feishu
  - id: feishu-bot-1
    driver: feishu
    enabled: false
    options:
      app_id: cli_xxxxxxxx
      app_secret: "your_app_secret"
      verification_token: "your_verification_token"
      encrypt_key: ""
      is_lark: false
      allow_from:
        - "*"
      group_trigger:
        mention_only: true
        prefixes:
          - /ask
          - /bot
    # webchat 等在 options 下使用 listen / path（见 webchat 示例）

  # Slack：Socket Mode（见 drivers/slack）
  - id: slack-bot-1
    driver: slack
    enabled: false
    options:
      bot_token: "xoxb-..."
      app_token: "xapp-..."
      allow_from:
        - "*"
      group_trigger:
        mention_only: true
        prefixes:
          - /ask

  # 本地浏览器聊天 UI（类 ChatGPT），经 HTTP + SSE 与总线交互；仅建议绑定 127.0.0.1
  - id: webchat-1
    driver: webchat
    enabled: false
    options:
      display_name: You
      listen: "127.0.0.1:8765"
      path: /

  # 占位/测试用 driver
  - id: noop-1
    driver: noop
    enabled: false
